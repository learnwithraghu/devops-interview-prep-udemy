name: 06 PR Secret Failure

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Attempt to use Secret
        run: |
          if [ -z "$MY_API_TOKEN" ]; then
            echo "Error: Secret MY_API_TOKEN is not available in this context!"
            exit 1
          fi
          echo "Secret is available."
        env:
          MY_API_TOKEN: ${{ secrets.MY_API_TOKEN }}
