apiVersion: batch/v1
kind: Job
metadata:
  name: hook-demo-migrate
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-weight: "{{ .Values.hooks.migration.weight }}"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: hook-demo-migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: busybox:latest
          command:
            - sh
            - -c
            - echo "Applying migration:" && cat /config/migration.sql
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          configMap:
            name: hook-demo-db-config
