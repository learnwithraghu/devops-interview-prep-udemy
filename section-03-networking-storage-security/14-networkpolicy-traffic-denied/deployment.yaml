apiVersion: apps/v1
kind: Deployment
metadata:
  name: netpol-demo
  labels:
    app: netpol-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netpol-demo
  template:
    metadata:
      labels:
        app: netpol-demo
    spec:
      containers:
        - name: app
          image: local/k8s-debug-app:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: netpol-demo
  labels:
    app: netpol-demo
spec:
  selector:
    app: netpol-demo
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: netpol-demo
spec:
  podSelector:
    matchLabels:
      app: netpol-demo
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8080
