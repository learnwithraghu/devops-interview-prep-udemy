apiVersion: v1
kind: ServiceAccount
metadata:
  name: rbac-demo-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rbac-demo-role
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rbac-demo-binding
subjects:
  - kind: ServiceAccount
    name: rbac-demo
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rbac-demo-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbac-demo
  labels:
    app: rbac-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rbac-demo
  template:
    metadata:
      labels:
        app: rbac-demo
    spec:
      serviceAccountName: rbac-demo-sa
      containers:
        - name: kubectl
          image: bitnami/kubectl:latest
          command: ["sleep", "infinity"]
