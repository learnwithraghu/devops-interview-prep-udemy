apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress-demo
  labels:
    app: ingress-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingress-demo
  template:
    metadata:
      labels:
        app: ingress-demo
    spec:
      containers:
        - name: app
          image: local/k8s-debug-app:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ingress-demo
  labels:
    app: ingress-demo
spec:
  selector:
    app: ingress-demo
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Secret
metadata:
  name: ingress-demo-tls
type: kubernetes.io/tls
data:
  tls.crt: 
  tls.key: 
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-demo
  labels:
    app: ingress-demo
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.demo.local
      secretName: demo-tls
  rules:
    - host: app.demo.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ingress-demo
                port:
                  number: 80
