apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-demo
  labels:
    app: oom-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-demo
  template:
    metadata:
      labels:
        app: oom-demo
    spec:
      containers:
        - name: app
          image: local/k8s-debug-app:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          # ISSUE: Memory limit is too low for the allocation request below
          resources:
            limits:
              memory: "64Mi"      # ❌ PROBLEM: Too small, will cause OOMKilled
            requests:
              memory: "32Mi"
          env:
            # This app will try to allocate 128MB on startup
            - name: OOM_ALLOCATE_MB
              value: "128"        # Will exceed the 64Mi limit above
