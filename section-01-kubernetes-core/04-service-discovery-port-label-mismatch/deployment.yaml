apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-demo
  labels:
    app: svc-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc-demo
  template:
    metadata:
      labels:
        app: svc-demo
    spec:
      containers:
        - name: app
          image: local/k8s-debug-app:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: svc-demo
  labels:
    app: svc-demo
spec:
  selector:
    app: web-app
  ports:
    - port: 80
      targetPort: 80
