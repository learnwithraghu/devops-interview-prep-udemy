apiVersion: apps/v1
kind: Deployment
metadata:
  name: subchart-demo
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: subchart-demo
  template:
    metadata:
      labels:
        app: subchart-demo
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
